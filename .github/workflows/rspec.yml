name: RSpec Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
            --health-cmd "redis-cli ping || exit 1"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=20
          
    env:
      RAILS_ENV: test
      DATABASE_NAME: edu_track_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y postgresql-client libpq-dev
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.1'
          bundler-cache: true

      - name: Prepare DB
        run: bin/rails db:prepare
      
      - name: Build CSS
        run: bin/rails dartsass:build

      - name: Run Tests
        run: bundle exec rspec
